name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust from rust-toolchain.toml
        run: bash scripts/check-toolchain.sh

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        continue-on-error: true
        with:
          shared-key: ${{ runner.os }}-lint-${{ hashFiles('rust-toolchain.toml') }}

      - name: Run lint checks
        run: scripts/check.sh --lint-only

  tests:
    name: tests-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    env:
      CARGO_INCREMENTAL: "0"
      NEXTEST_SHOW_PROGRESS: "none"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust from rust-toolchain.toml
        run: bash scripts/check-toolchain.sh

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        continue-on-error: true
        with:
          shared-key: ${{ runner.os }}-tests-${{ hashFiles('rust-toolchain.toml') }}
      - name: Cache cargo bin
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        continue-on-error: true
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
          restore-keys: |
            ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
      - name: Install nextest
        uses: taiki-e/install-action@aba36d755ec7ca22d38b12111787c26115943952 # v2
        with:
          tool: cargo-nextest@0.9.129

      - name: Run checks
        run: scripts/check.sh --tests-only
