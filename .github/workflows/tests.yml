name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust from rust-toolchain.toml
        run: bash scripts/check-toolchain.sh

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.14.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        continue-on-error: true
        with:
          shared-key: ${{ runner.os }}-lint-${{ hashFiles('rust-toolchain.toml') }}

      - name: Run lint checks
        run: npm run lint

      - name: Run npm wrapper smoke test
        run: npm run test:npm-wrapper

  tests:
    name: tests-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    env:
      CARGO_INCREMENTAL: "0"
      NEXTEST_SHOW_PROGRESS: "none"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust from rust-toolchain.toml
        run: bash scripts/check-toolchain.sh

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.14.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        continue-on-error: true
        with:
          shared-key: ${{ runner.os }}-tests-${{ hashFiles('rust-toolchain.toml') }}
      - name: Cache cargo bin
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        continue-on-error: true
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
          restore-keys: |
            ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
      - name: Install nextest
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: cargo-nextest@0.9.129

      - name: Run checks
        run: npm test
