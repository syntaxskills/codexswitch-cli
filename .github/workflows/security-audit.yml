name: security-audit

on:
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust from rust-toolchain.toml
        run: bash scripts/check-toolchain.sh

      - name: Install cargo-audit
        uses: taiki-e/install-action@aba36d755ec7ca22d38b12111787c26115943952 # v2
        with:
          tool: cargo-audit@0.22.1

      - name: Run cargo audit
        run: |
          cargo fetch --locked
          cargo audit --deny warnings
