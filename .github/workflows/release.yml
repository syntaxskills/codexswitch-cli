name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish or recover (for example, v0.3.0)
        required: true
        type: string
      bootstrap_crates_io:
        description: Use CARGO_REGISTRY_TOKEN for the crate's one-time initial publish
        required: false
        default: false
        type: boolean
      verify_crates_io_trusted_publisher:
        description: Verify crates.io OIDC authentication even if the version is already published
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  tag-check:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
      - id: release
        name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi

          [[ -n "${tag}" ]] || { echo "Missing release tag"; exit 1; }
          [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?$ ]] \
            || { echo "Tag '${tag}' does not match vX.Y.Z or vX.Y.Z-alpha.N"; exit 1; }

          checked_out_tag="$(git describe --tags --exact-match HEAD 2>/dev/null || true)"
          [[ "${checked_out_tag}" == "${tag}" ]] \
            || { echo "Checked out ref does not match tag ${tag}"; exit 1; }

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          if [[ "${tag}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag matches versions
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          cargo_ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *\"([^\"]+)\".*/\1/')"
          npm_ver="$(python3 - <<'PY'
          import json
          with open("package.json", "r", encoding="utf-8") as fh:
              print(json.load(fh)["version"])
          PY
          )"

          echo "Tag: ${RELEASE_TAG}"
          echo "Tag version: ${RELEASE_VERSION}"
          echo "Cargo version: ${cargo_ver}"
          echo "NPM version: ${npm_ver}"

          [[ "${RELEASE_VERSION}" == "${cargo_ver}" ]] || { echo "Tag ${RELEASE_VERSION} != Cargo.toml ${cargo_ver}"; exit 1; }
          [[ "${RELEASE_VERSION}" == "${npm_ver}" ]] || { echo "Tag ${RELEASE_VERSION} != package.json ${npm_ver}"; exit 1; }

  verify:
    needs: tag-check
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tag-check.outputs.tag }}
      - name: Install Rust from rust-toolchain.toml
        run: bash scripts/check-toolchain.sh
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: cargo-audit@0.22.1
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: cargo-nextest@0.9.129
      - name: Cache cargo bin
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        continue-on-error: true
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
          restore-keys: |
            ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        continue-on-error: true
        with:
          shared-key: ${{ runner.os }}-verify-${{ hashFiles('rust-toolchain.toml') }}
      - name: Run checks
        run: scripts/check.sh

  build:
    needs: [tag-check, verify]
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: codexswitch-cli
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: codexswitch-cli
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary: codexswitch-cli
          - runner: macos-15
            target: aarch64-apple-darwin
            binary: codexswitch-cli
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            binary: codexswitch-cli.exe

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tag-check.outputs.tag }}
      - name: Install Rust from rust-toolchain.toml
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/check-toolchain.sh
          rustup target add "${{ matrix.target }}"
      - name: Cache cargo bin
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        continue-on-error: true
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        continue-on-error: true
        with:
          shared-key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Cargo build
        shell: bash
        run: |
          set -euo pipefail
          cargo fetch --locked
          cargo build --release --target ${{ matrix.target }} --bin codexswitch-cli --locked
          echo "Build output:"
          ls -la target/${{ matrix.target }}/release || true
      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codexswitch-cli-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  package:
    needs: [tag-check, build, verify]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tag-check.outputs.tag }}
      - name: Install Rust from rust-toolchain.toml
        run: bash scripts/check-toolchain.sh
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 24.14.0
          registry-url: https://registry.npmjs.org
      - name: Cache cargo bin
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        continue-on-error: true
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
          restore-keys: |
            ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/artifacts
      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.tag-check.outputs.version }}"
          scripts/release-artifacts.sh "${version}" dist/artifacts dist
          scripts/verify-artifacts.sh "${version}" dist

      - name: Generate artifact attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/release/*
            dist/npm-packages/*.tgz
            dist/homebrew/*.rb
            dist/cargo/*.crate
            dist/checksums/*

      - id: crates_io_status
        name: Check crates.io publication status
        if: ${{ needs.tag-check.outputs.prerelease != 'true' && github.repository == 'syntaxskills/codexswitch-cli' }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.tag-check.outputs.version }}"
          url="https://crates.io/api/v1/crates/codexswitch-cli/${version}"
          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            -H "User-Agent: ${GITHUB_REPOSITORY}" "${url}")"

          case "${status}" in
            200)
              echo "codexswitch-cli ${version} is already published to crates.io"
              echo "published=true" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "codexswitch-cli ${version} is not published to crates.io"
              echo "published=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "crates.io returned HTTP ${status} while checking ${url}" >&2
              exit 1
              ;;
          esac

      - id: crates_io_auth
        name: Authenticate to crates.io with trusted publishing
        if: ${{ needs.tag-check.outputs.prerelease != 'true' && github.repository == 'syntaxskills/codexswitch-cli' && inputs.bootstrap_crates_io != true && (steps.crates_io_status.outputs.published == 'false' || inputs.verify_crates_io_trusted_publisher == true) }}
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Verify crates.io trusted publisher
        if: ${{ needs.tag-check.outputs.prerelease != 'true' && github.repository == 'syntaxskills/codexswitch-cli' && inputs.verify_crates_io_trusted_publisher == true }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_io_auth.outputs.token }}
        run: |
          set -euo pipefail
          test -n "${CARGO_REGISTRY_TOKEN}" || {
            echo "Trusted publishing did not return a crates.io token" >&2
            exit 1
          }
          echo "crates.io trusted publisher authentication succeeded"

      - name: Publish to crates.io with trusted publishing
        if: ${{ needs.tag-check.outputs.prerelease != 'true' && github.repository == 'syntaxskills/codexswitch-cli' && steps.crates_io_status.outputs.published == 'false' && inputs.bootstrap_crates_io != true }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_io_auth.outputs.token }}
        run: |
          set -euo pipefail
          test -n "${CARGO_REGISTRY_TOKEN}" || { echo "Trusted publishing did not return a crates.io token" >&2; exit 1; }
          cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"

      - name: Bootstrap initial crates.io publication
        if: ${{ needs.tag-check.outputs.prerelease != 'true' && github.repository == 'syntaxskills/codexswitch-cli' && steps.crates_io_status.outputs.published == 'false' && inputs.bootstrap_crates_io == true }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${CARGO_REGISTRY_TOKEN}" || {
            echo "bootstrap_crates_io requires the CARGO_REGISTRY_TOKEN Actions secret" >&2
            exit 1
          }
          cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"

      - name: Publish to npm
        if: ${{ needs.tag-check.outputs.prerelease != 'true' && github.repository == 'syntaxskills/codexswitch-cli' }}
        run: |
          set -euo pipefail
          echo "Publishing to npm from ${GITHUB_REPOSITORY} via trusted publishing..."
          node --version
          npm_version="$(npm --version)"
          echo "npm ${npm_version}"
          python3 - "${npm_version}" <<'PY'
          import sys

          required = (11, 5, 1)
          got = tuple(int(part) for part in sys.argv[1].split(".")[:3])
          if got < required:
              raise SystemExit(
                  f"npm {sys.argv[1]} is too old for trusted publishing; need >= 11.5.1"
              )
          PY
          version="${{ needs.tag-check.outputs.version }}"

          package_name() {
            tar -xOzf "$1" package/package.json \
              | python3 -c 'import json, sys; print(json.load(sys.stdin)["name"])'
          }

          publish_if_missing() {
            local pkg="$1"
            local name
            name="$(package_name "$pkg")"

            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping npm publish for ${name}@${version}: already published"
              return 0
            fi

            npm publish "$pkg" --access public --provenance
          }

          # Publish platform packages first so optionalDependencies can resolve.
          for pkg in dist/npm-packages/syntaxskills-codexswitch-cli-*-*.tgz; do
            publish_if_missing "$pkg"
          done

          publish_if_missing "dist/npm-packages/syntaxskills-codexswitch-cli-${version}.tgz"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.tag-check.outputs.tag }}
          files: |
            dist/release/*
            dist/npm-packages/*.tgz
            dist/homebrew/*.rb
            dist/cargo/*.crate
            dist/checksums/*
          generate_release_notes: true
          prerelease: ${{ needs.tag-check.outputs.prerelease == 'true' }}

      - name: Verify stable release channels
        if: ${{ needs.tag-check.outputs.prerelease != 'true' && github.repository == 'syntaxskills/codexswitch-cli' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.tag-check.outputs.tag }}
          RELEASE_VERSION: ${{ needs.tag-check.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          npm_packages=(
            "@syntaxskills/codexswitch-cli"
            "@syntaxskills/codexswitch-cli-darwin-arm64"
            "@syntaxskills/codexswitch-cli-darwin-x64"
            "@syntaxskills/codexswitch-cli-linux-arm64"
            "@syntaxskills/codexswitch-cli-linux-x64"
            "@syntaxskills/codexswitch-cli-win32-x64"
          )

          retry() {
            local description="$1"
            shift

            for attempt in {1..12}; do
              if "$@"; then
                echo "Verified ${description}"
                return 0
              fi
              echo "Waiting for ${description} (attempt ${attempt}/12)"
              sleep 10
            done

            echo "Failed to verify ${description}" >&2
            return 1
          }

          verify_crates_io() {
            curl --fail --silent --show-error \
              -H "User-Agent: ${GITHUB_REPOSITORY}" \
              "https://crates.io/api/v1/crates/codexswitch-cli/${RELEASE_VERSION}" \
              >/dev/null
          }

          verify_npm_package() {
            local package="$1"
            [[ "$(npm view "${package}@${RELEASE_VERSION}" version 2>/dev/null)" == "${RELEASE_VERSION}" ]]
          }

          verify_github_release() {
            gh release view "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json isDraft,isPrerelease,tagName \
              | jq --exit-status --arg tag "${RELEASE_TAG}" \
                '.tagName == $tag and .isDraft == false and .isPrerelease == false' \
                >/dev/null
          }

          retry "crates.io codexswitch-cli ${RELEASE_VERSION}" verify_crates_io
          for package in "${npm_packages[@]}"; do
            retry "npm ${package}@${RELEASE_VERSION}" verify_npm_package "${package}"
          done
          retry "GitHub Release ${RELEASE_TAG}" verify_github_release
